on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: curl -Ls https://astral.sh/uv/install.sh | sh

      - name: Install project
        run: |
          uv venv
          uv pip install -e .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .
